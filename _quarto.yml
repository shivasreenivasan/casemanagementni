project:
  type: website
  output-dir: docs

website:
  title: "Case Management NI"
  site-url: "https://casemanagementni.co.uk"
  open-graph: true
  twitter-card: true

  navbar:
    background: light
    left:
      - href: index.qmd
        text: Home
      - text: Services
        menu:
          - href: services.qmd
            text: Overview
          - href: services/brain-injury.qmd
            text: Brain Injury
          - href: services/neurorehabilitation.qmd
            text: Neurorehabilitation
          - href: services/catastrophic-injury.qmd
            text: Catastrophic Injury
      - href: referrals.qmd
        text: Referrals
      - href: professionals.qmd
        text: Professionals
      - href: about.qmd
        text: About
      - href: contact.qmd
        text: Contact
    right:
      - icon: question-circle
        href: faq.qmd
        aria-label: "Frequently asked questions"
    tools:
      - icon: moon
        id: quarto-color-scheme-toggle
        aria-label: "Toggle dark mode"

  page-footer:
    border: true
    left: "© 2026 Case Management NI"
    center:
      - text: "Privacy"
        href: privacy.qmd
      - text: "FAQ"
        href: faq.qmd
      - text: "Resources"
        href: resources.qmd
    right:
      - text: "Contact"
        href: contact.qmd

format:
  html:
    theme:
      light: [flatly, theme-light.scss]
      dark: [darkly, theme-dark.scss]
    css: styles.css
    toc: true
    toc-location: left
    page-layout: article
    mainfont: "Source Sans 3"
    image: images/social-preview.png
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
